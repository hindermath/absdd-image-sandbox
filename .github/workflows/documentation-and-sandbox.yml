name: Documentation and Sandbox Static Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  markdown-links:
    name: Markdown links and anchors
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check local Markdown links and anchors with Lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --offline
            --include-fragments
            --no-progress
            --exclude-path docs/security/agent-session-log
            './**/*.md'
          fail: true

  sandbox-static:
    name: Sandbox static contracts
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Dockerfile pins and agent parity
        run: python3 scripts/check-dockerfile-arg-renovate.py

      - name: Check shell syntax
        run: |
          bash -n scripts/audit-export.sh
          bash -n scripts/smoke-test-toolchains.sh
          bash -n scripts/compose-down-with-audit.sh
