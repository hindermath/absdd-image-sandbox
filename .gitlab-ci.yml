stages:
  - test

secret_scan:
  stage: test
  image:
    name: zricethezav/gitleaks:v8.30.1
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - gitleaks git --config .gitleaks.toml --redact --verbose --report-format json --report-path gl-secret-detection-report.json .
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - gl-secret-detection-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
