services:
  opencode:
    build:
      context: .
      pull: true
    volumes:
      - ./workspace:/workspace
      - /mnt/c/Users/thinder/RiderProjects:/rider-projects
      - ./dotnet/ContainerBuild.props:/dotnet-config/ContainerBuild.props:ro
      - dotnet_build:/dotnet-build
      - opencode_data:/home/opencode/.local/share/opencode
    working_dir: /workspace
    env_file:
      - opencode.env
    environment:
      DirectoryBuildPropsPath: /dotnet-config/ContainerBuild.props
      DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE: "true"
      MSBuildEnableWorkloadResolver: "false"
    restart: unless-stopped

volumes:
  dotnet_build:
  opencode_data:
