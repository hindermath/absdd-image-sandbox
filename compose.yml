services:
  ade:
    # Public training sandbox: keep Compose default bridge with free egress for
    # the learning environment. See docs/security/network-decision.md.
    build:
      context: .
      pull: true
    volumes:
      - ./workspace:/workspace
      # Repository self-mount for controlled maintenance tasks from inside the
      # container. The default is this checkout; public users may override it
      # with another local checkout path.
      - type: bind
        source: ${ADE_DEV_SANDBOX_DIR:-.}
        target: /ade-dev-sandbox
      - type: bind
        source: ${RIDER_PROJECTS_DIR:-./workspace}
        target: /rider-projects
      - type: bind
        source: ${JAVA_PROJECTS_DIR:-./java-projects}
        target: /java-projects
      - type: bind
        source: ${GO_PROJECTS_DIR:-./go-projects}
        target: /go-projects
      - type: bind
        source: ${RUST_PROJECTS_DIR:-./rust-projects}
        target: /rust-projects
      - type: bind
        source: ${PYTHON_PROJECTS_DIR:-./python-projects}
        target: /python-projects
      - type: bind
        source: ${SWIFT_PROJECTS_DIR:-./swift-projects}
        target: /swift-projects
      - type: bind
        source: ${SECURE_CASE_TRACKER_PROJECTS_DIR:-./secure-case-tracker-projects}
        target: /secure-case-tracker-projects
      - type: bind
        source: ${SECURE_SERVICE_HARVESTER_PROJECTS_DIR:-./secure-service-harvester-projects}
        target: /secure-service-harvester-projects
      - type: bind
        source: ${SECURE_ORDER_DESK_PROJECTS_DIR:-./secure-order-desk-projects}
        target: /secure-order-desk-projects
      - type: bind
        source: ${AUDIT_DIR:-./audit-logs}
        target: /audit
      - ./dotnet/ContainerBuild.props:/dotnet-config/ContainerBuild.props:ro
      - dotnet_build:/dotnet-build
      - opencode_data:/home/adedev/.local/share/opencode
      - codex_data:/home/adedev/.codex
    ports:
      - "127.0.0.1:5100-5199:5100-5199"
    # P3-4 defense-in-depth: prevent processes from gaining new privileges
    # through setuid/setgid binaries or file capabilities at runtime.
    security_opt:
      - no-new-privileges:true
    # P3-4 test hardening profile: start with all Linux capabilities dropped.
    # If a required tool breaks, add back only the specific capability needed.
    cap_drop:
      - ALL
    working_dir: /rider-projects
    env_file:
      - opencode.env
    environment:
      DirectoryBuildPropsPath: /dotnet-config/ContainerBuild.props
      DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE: "true"
      MSBuildEnableWorkloadResolver: "false"
      # Best-effort shutdown safety net: the image entrypoint runs
      # audit-export on graceful container termination. The documented
      # standard stop path remains scripts/compose-down-with-audit.*.
      ADE_AUDIT_ON_STOP: "true"
    restart: unless-stopped

volumes:
  dotnet_build:
  opencode_data:
  codex_data:
