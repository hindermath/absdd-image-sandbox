repos:
  - repo: local
    hooks:
      - id: dockerfile-arg-renovate-metadata
        name: check Dockerfile ARG Renovate metadata
        entry: python scripts/check-dockerfile-arg-renovate.py
        language: python
        pass_filenames: false
        files: ^(Dockerfile|renovate\.json|scripts/check-dockerfile-arg-renovate\.py)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml
